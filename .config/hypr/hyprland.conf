# Hyprland Config
# Migrated from xmonad.hs and xrandr

# ---------------------------------------------------------------------------
# Monitors
# Migrated from t480-dual-monitor.sh
# ---------------------------------------------------------------------------
monitor=eDP-1,disable
monitor=DP-1,disable
monitor=HDMI-A-1,disable
monitor=DP-2,disable
monitor=HDMI-A-2,disable
# Approximate names for Wayland (DVI-I might show up differently depending on dock)
monitor=DVI-I-2,1920x1080@60,0x0,1
monitor=DVI-I-1,2560x1440@60,1920x0,1
# Fallback for any other monitor
monitor=,preferred,auto,1

# ---------------------------------------------------------------------------
# Autostart
# ---------------------------------------------------------------------------
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = mako
exec-once = hypridle
exec-once = swayosd-server
exec-once = polkit-gnome-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = swaybg -m fill -i $HOME/Backgrounds/desktop.png
exec-once = kanshi # If you use kanshi for dynamic monitor profiles
exec-once = lxsession

# ---------------------------------------------------------------------------
# Environment Variables
# ---------------------------------------------------------------------------
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Capitaine Cursors - White

# ---------------------------------------------------------------------------
# Input
# ---------------------------------------------------------------------------
input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }
}

# ---------------------------------------------------------------------------
# General Appearance
# ---------------------------------------------------------------------------
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 3
    
    # Active/Inactive colors from xmonad config
    col.active_border = rgb(c792ea)
    col.inactive_border = rgb(c0a79a)

    layout = master
}

decoration {
    rounding = 0
    drop_shadow = false
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# ---------------------------------------------------------------------------
# Layouts
# ---------------------------------------------------------------------------
master {
    new_is_master = true
    mfact = 0.5
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

misc {
    disable_hyprland_logo = true
}

# ---------------------------------------------------------------------------
# Window Rules (from myManageHook)
# ---------------------------------------------------------------------------
windowrule = float, ^(yad)$
windowrule = center, ^(yad)$
windowrule = float, ^(pavucontrol)$
windowrule = float, title:^(Oracle VM VirtualBox Manager)$
windowrule = float, title:^(Peek)$

windowrulev2 = workspace 1, class:^(Slack)$
windowrulev2 = workspace 2, class:^(Emacs)$
windowrulev2 = workspace 5, class:^(VirtualBox Manager)$
windowrulev2 = workspace 5, class:^(steam)$
windowrulev2 = workspace 6, class:^(Chromium)$
windowrulev2 = workspace 6, class:^(Brave-browser-nightly)$
windowrulev2 = workspace 7, class:^(zen)$
windowrulev2 = workspace 7, title:^(Mozilla Firefox Developer Edition)$
windowrulev2 = workspace 8, class:^(mpv)$
windowrulev2 = workspace 9, class:^(Gimp)$
windowrulev2 = workspace 9, title:^(Mozilla Firefox)$
windowrulev2 = workspace 9, class:^(Audacious)$
windowrulev2 = workspace 10, class:^(discord)$
windowrulev2 = workspace 10, class:^(Discord)$

# Picture-in-Picture automatic pinning (copy to all workspaces)
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = float, class:^(firefox)$, title:^(Picture-in-Picture)$
windowrulev2 = pin, class:^(firefox)$, title:^(Picture-in-Picture)$

# ---------------------------------------------------------------------------
# Keybindings (from myKeys)
# ---------------------------------------------------------------------------
$mainMod = SUPER

# Essentials
bind = $mainMod CTRL, R, exec, hyprctl reload
bind = $mainMod SHIFT, Q, exit
bind = $mainMod SHIFT, C, killactive
bind = $mainMod SHIFT, RETURN, exec, wofi --show drun

# Apps
bind = $mainMod, RETURN, exec, ghostty
bind = $mainMod, B, exec, firefox
bind = $mainMod ALT, H, exec, ghostty -e htop
bind = $mainMod, E, exec, emacsclient -c -a 'emacs'

# Focus
bind = $mainMod, J, layoutmsg, cyclenext
bind = $mainMod, K, layoutmsg, cycleprev
bind = $mainMod, M, layoutmsg, focusmaster

# Swap
bind = $mainMod SHIFT, J, layoutmsg, swapnext
bind = $mainMod SHIFT, K, layoutmsg, swapprev
bind = $mainMod SHIFT, M, layoutmsg, swapwithmaster

# Resizing
bind = $mainMod, H, resizeactive, -40 0
bind = $mainMod, L, resizeactive, 40 0

# Floating & Pinning (Copy to all workspaces)
bind = $mainMod, F, togglefloating
bind = $mainMod, T, togglefloating
bind = $mainMod SHIFT, P, pin

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod SHIFT, Page_Down, workspace, m+1
bind = $mainMod SHIFT, Page_Up, workspace, m-1

# Media keys
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioLowerVolume, exec, swayosd-client --output-volume -5
bind = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume +5
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86HomePage, exec, firefox https://www.youtube.com/c/DistroTube
bind = , XF86Search, exec, dm-websearch
bind = , XF86Mail, exec, thunderbird
bind = , XF86Calculator, exec, qalculate-gtk
bind = , XF86Eject, exec, eject /dev/cdrom
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# ---------------------------------------------------------------------------
# Migrated Xmonad Extras
# ---------------------------------------------------------------------------

# Monitors
bind = $mainMod, period, focusmonitor, +1
bind = $mainMod, comma, focusmonitor, -1

# Window and layout interactions
bind = $mainMod SHIFT, comma, layoutmsg, rollprev
bind = $mainMod SHIFT, period, layoutmsg, rollnext
bind = $mainMod, BackSpace, layoutmsg, swapwithmaster
bind = $mainMod SHIFT, Up, layoutmsg, addmaster
bind = $mainMod SHIFT, Down, layoutmsg, removemaster
bind = $mainMod ALT, J, resizeactive, 0 -40
bind = $mainMod ALT, K, resizeactive, 0 40
bind = $mainMod SHIFT, Space, fullscreen

# Groups (Sublayouts)
bind = $mainMod CTRL, H, moveintogroup, l
bind = $mainMod CTRL, L, moveintogroup, r
bind = $mainMod CTRL, K, moveintogroup, u
bind = $mainMod CTRL, J, moveintogroup, d
bind = $mainMod CTRL, M, togglegroup
bind = $mainMod CTRL, slash, moveoutofgroup
bind = $mainMod CTRL, period, changegroupactive, f
bind = $mainMod CTRL, comma, changegroupactive, b

# Missing utilities
bind = $mainMod CTRL, T, exec, hyprctl switchxkblayout all next
bind = $mainMod SHIFT, L, exec, hyprlock
bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness +5
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness -5
bind = $mainMod SHIFT, slash, exec, wofi --show run
bind = $mainMod SHIFT, B, exec, killall -SIGUSR1 waybar
bind = $mainMod ALT, RETURN, exec, wofi --show drun
bind = $mainMod ALT, 1, exec, wofi --show drun
bind = $mainMod ALT, 2, exec, wofi --show drun
bind = $mainMod ALT, 3, exec, wofi --show drun
bind = $mainMod ALT, 4, exec, wofi --show drun
bind = $mainMod ALT, 5, exec, wofi --show drun
bind = $mainMod ALT, 6, exec, wofi --show drun
bind = $mainMod ALT, 7, exec, wofi --show drun
bind = $mainMod ALT, 8, exec, wofi --show drun

# Submap: Dmenu scripts (M-p)
bind = $mainMod, P, submap, dmenu
submap = dmenu
bind = , H, exec, dm-hub
bind = , H, submap, reset
bind = , P, exec, grim -g "$(slurp)" - | wl-copy
bind = , P, submap, reset
bind = , T, exec, thunar
bind = , T, submap, reset
bind = , V, exec, peek
bind = , V, submap, reset
bind = , escape, submap, reset
submap = reset

# Submap: Scratchpads (M-s)
bind = $mainMod, S, submap, scratchpads
submap = scratchpads
bind = , T, togglespecialworkspace, terminal
bind = , T, submap, reset
bind = , M, togglespecialworkspace, mocp
bind = , M, submap, reset
bind = , escape, submap, reset
submap = reset
bind = $mainMod, Escape, togglespecialworkspace, calculator

# Submap: Mocp (M-u)
bind = $mainMod, U, submap, mocp
submap = mocp
bind = , P, exec, mocp --play
bind = , P, submap, reset
bind = , L, exec, mocp --next
bind = , L, submap, reset
bind = , H, exec, mocp --previous
bind = , H, submap, reset
bind = , F, exec, mocp --toggle-pause
bind = , F, submap, reset
bind = , escape, submap, reset
submap = reset

# Submap: Emacs (M-e)
bind = $mainMod, E, submap, emacs
submap = emacs
bind = , E, exec, emacsclient -c -a 'emacs'
bind = , E, submap, reset
bind = , A, exec, emacsclient -c -a 'emacs' --eval '(emms)' --eval '(emms-play-directory-tree "~/Music/")'
bind = , A, submap, reset
bind = , B, exec, emacsclient -c -a 'emacs' --eval '(ibuffer)'
bind = , B, submap, reset
bind = , D, exec, emacsclient -c -a 'emacs' --eval '(dired nil)'
bind = , D, submap, reset
bind = , I, exec, emacsclient -c -a 'emacs' --eval '(erc)'
bind = , I, submap, reset
bind = , N, exec, emacsclient -c -a 'emacs' --eval '(elfeed)'
bind = , N, submap, reset
bind = , S, exec, emacsclient -c -a 'emacs' --eval '(eshell)'
bind = , S, submap, reset
bind = , V, exec, emacsclient -c -a 'emacs' --eval '(+vterm/here nil)'
bind = , V, submap, reset
bind = , W, exec, emacsclient -c -a 'emacs' --eval '(doom/window-maximize-buffer(eww "distro.tube"))'
bind = , W, submap, reset
bind = , escape, submap, reset
submap = reset
