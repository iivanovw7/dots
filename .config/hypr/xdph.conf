# XDG Desktop Portal Configuration
# This file ensures that Hyprland uses the correct portal backends,
# preventing slow app startups when GNOME is also installed.

[preferred]
# Use the Hyprland portal for screenshots and screen sharing
default=hyprland;gtk

# Use the GTK portal for file pickers and other standard dialogs
org.freedesktop.impl.portal.FileChooser=gtk
org.freedesktop.impl.portal.Settings=gtk
org.freedesktop.impl.portal.AppChooser=gtk
